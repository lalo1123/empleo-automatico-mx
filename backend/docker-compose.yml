# Optional local compose file for testing the image with a persistent volume.
# Usage:
#   docker compose up --build
#
# In production Dokploy builds and deploys the Dockerfile directly.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: skybrandmx/empleo-api:local
    container_name: empleo-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_PATH: /app/data/empleo.db
    ports:
      - "8787:8787"
    volumes:
      - empleo-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  empleo-data:
