<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Empleo Automático MX — Postúlate a más empleos en menos tiempo. Por SkyBrandMX.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2030"/>
      <stop offset="100%" stop-color="#142a3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="60%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.35)"/>
      <stop offset="100%" stop-color="rgba(14,165,233,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="55%">
      <stop offset="0%" stop-color="rgba(14,165,233,0.3)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark (SB) -->
  <g transform="translate(80 80)">
    <rect width="88" height="88" rx="18" fill="url(#bg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="44" y="62" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="900" font-size="30" letter-spacing="1.5"
          fill="url(#accent)">SB</text>
  </g>

  <!-- Badge "Por SkyBrandMX" -->
  <g transform="translate(188 98)">
    <rect width="240" height="52" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="24" cy="26" r="4" fill="url(#accent)"/>
    <text x="40" y="33" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.88)">Por SkyBrandMX</text>
  </g>

  <!-- Headline -->
  <text x="80" y="310"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="88" letter-spacing="-2"
        fill="#ffffff">
    Postúlate a más empleos
  </text>
  <text x="80" y="410"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="88" letter-spacing="-2"
        fill="url(#accent)">
    en menos tiempo.
  </text>

  <!-- Subhead -->
  <text x="80" y="475"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="400" font-size="28" letter-spacing="0"
        fill="rgba(255,255,255,0.78)">
    Copiloto con IA para OCC Mundial. Tú das el último clic.
  </text>

  <!-- Footer bar -->
  <g transform="translate(80 540)">
    <text x="0" y="20"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="700" font-size="22" letter-spacing="0.5"
          fill="#ffffff">
      empleo.skybrandmx.com
    </text>
    <text x="0" y="50"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="500" font-size="18"
          fill="rgba(255,255,255,0.55)">
      Desde $199 MXN al mes · Sin tarjeta para probar
    </text>
  </g>

  <!-- Decorative gradient line -->
  <rect x="80" y="230" width="120" height="6" rx="3" fill="url(#accent)"/>
</svg>
